          - heading "실행계획 (EXPLAIN)" [level=3] [ref=e595]
          - code [ref=e597]: "# 실제 실행 + 버퍼까지 (진짜 느린 원인 찾을 때 이거) EXPLAIN (ANALYZE, BUFFERS) SELECT ... FROM orders WHERE user_id = 42; # 계획만 (쿼리 실제 실행 안 함, 안전) EXPLAIN SELECT ... FROM orders WHERE user_id = 42; # 포맷 옵션 EXPLAIN (ANALYZE, BUFFERS, FORMAT JSON) SELECT ...; # MySQL: EXPLAIN ANALYZE SELECT ...; / EXPLAIN FORMAT=JSON SELECT ...; # MySQL 8: EXPLAIN ANALYZE 는 실제 실행됨 (Postgres와 동일 주의)"
          - generic [ref=e598]:
            - generic [ref=e599]: 주의
            - paragraph [ref=e600]:
              - code [ref=e601]: ANALYZE
              - text: 는 쿼리를 실제로 실행한다. UPDATE/DELETE/INSERT에 붙이면 데이터가 바뀐다. 쓰기 쿼리는
              - code [ref=e602]: BEGIN; EXPLAIN (ANALYZE) ...; ROLLBACK;
              - text: 로 감싼다.
          - heading "인덱스 확인·생성" [level=3] [ref=e603]
          - code [ref=e605]: "# 테이블의 인덱스/컬럼/제약 한눈에 (psql) \\d orders \\d+ orders # 인덱스 목록만 SELECT * FROM pg_indexes WHERE tablename = 'orders'; # 인덱스 정의 + 크기 SELECT indexname, indexdef FROM pg_indexes WHERE tablename = 'orders'; SELECT pg_size_pretty(pg_relation_size('idx_orders_user_id')); # 락 없이 인덱스 생성 (운영 테이블은 반드시 CONCURRENTLY) CREATE INDEX CONCURRENTLY idx_orders_user_id ON orders (user_id); # 복합 인덱스 (컬럼 순서 = 좌측 우선 규칙) CREATE INDEX idx_orders_user_created ON orders (user_id, created_at DESC); # 부분 인덱스 (조건 걸린 행만 색인 → 작고 빠름) CREATE INDEX idx_orders_active ON orders (user_id) WHERE status = 'ACTIVE'; # 안 쓰이는 인덱스 찾기 (idx_scan = 0) SELECT relname, indexrelname, idx_scan FROM pg_stat_user_indexes ORDER BY idx_scan ASC;"
