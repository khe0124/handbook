              - text: 는 연결을 끊는다. 트랜잭션 중이면 rollback된다. 운영에서 남의 세션 죽이기 전에 무슨 쿼리인지 반드시 확인.
          - heading "느린 쿼리 통계 (pg_stat_statements)" [level=3] [ref=e619]
