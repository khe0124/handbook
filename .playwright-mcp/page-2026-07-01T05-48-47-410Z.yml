          - heading "요청 찌르기 (curl / HTTPie)" [level=3] [ref=e409]
          - code [ref=e411]: "# 헤더까지 보기 — status, 응답 헤더 확인 (가장 많이 씀) curl -i https://api.example.com/orders/42 # 상태코드만 뽑기 curl -s -o /dev/null -w '%{http_code}\\n' https://api.example.com/health # POST + JSON + 멱등키 (재시도 안전) curl -X POST \\ -H 'Content-Type: application/json' \\ -H 'Idempotency-Key: 8f14e45f-ceea-467a-9c3d-1b2c3d4e5f60' \\ -d '{\"amount\":1000,\"currency\":\"KRW\"}' \\ https://api.example.com/payments # Bearer 토큰 인증 curl -H 'Authorization: Bearer <token>' https://api.example.com/me # 타임/트레이스 프로파일 (DNS→connect→TTFB→total) curl -s -o /dev/null \\ -w 'dns:%{time_namelookup} conn:%{time_connect} ttfb:%{time_starttransfer} total:%{time_total}\\n' \\ https://api.example.com/orders"
          - code [ref=e413]: "# HTTPie — 키=값이면 자동 JSON, 사람이 읽기 좋게 출력 http POST api.example.com/payments amount=1000 currency=KRW \\ Idempotency-Key:8f14e45f-ceea-467a Authorization:'Bearer <token>' # 헤더만 보기 http --headers GET api.example.com/orders/42"
          - heading "응답 파싱 (jq)" [level=3] [ref=e414]
          - code [ref=e416]: "# 특정 필드 curl -s api.example.com/orders/42 | jq '.status' # 배열에서 골라 뽑기 curl -s api.example.com/orders | jq '.data[] | {id, status}' # 조건 필터 (실패 건만) curl -s api.example.com/orders | jq '.data[] | select(.status==\"FAILED\")' # 개수 세기 curl -s api.example.com/orders | jq '.data | length'"
          - heading "부하 테스트" [level=3] [ref=e417]
