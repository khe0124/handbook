          - code [ref=e614]: "# 지금 잡혀 있는 락 (누가 무엇을) SELECT * FROM pg_locks WHERE NOT granted; # 무엇이 무엇을 막는지 (blocking → blocked) — 가장 실전적 SELECT blocked.pid AS blocked_pid, blocking.pid AS blocking_pid, blocked.query AS blocked_query, blocking.query AS blocking_query FROM pg_stat_activity blocked JOIN pg_stat_activity blocking ON blocking.pid = ANY(pg_blocking_pids(blocked.pid)) WHERE blocked.wait_event_type = 'Lock'; # 오래 도는 쿼리 (5초 이상) SELECT pid, now() - query_start AS runtime, state, query FROM pg_stat_activity WHERE state != 'idle' AND now() - query_start > interval '5 seconds' ORDER BY runtime DESC; # 문제 세션 죽이기 (cancel = 쿼리만, terminate = 연결까지) SELECT pg_cancel_backend(<pid>); SELECT pg_terminate_backend(<pid>);"
